<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير مصرح - دلاّل</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="fontawesome-free-7.1.0-web/fontawesome-free-7.1.0-web/css/all.min.css">
    <style>
        .access-denied-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .access-denied-content {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        .access-denied-icon {
            font-size: 80px;
            color: #e74c3c;
            margin-bottom: 30px;
        }
        .access-denied-title {
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .access-denied-message {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .access-denied-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: var(--primary-color, #667eea);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-secondary {
            background: #ecf0f1;
            color: #2c3e50;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        .btn-secondary:hover {
            background: #d5dbdb;
        }
    </style>
</head>
<body>
    <div class="access-denied-container">
        <div class="access-denied-content">
            <div class="access-denied-icon">
                <i class="fas fa-ban"></i>
            </div>
            <h1 class="access-denied-title">غير مصرح لك بالوصول</h1>
            <p class="access-denied-message">
                غير مصرح لك بالوصول إلى هذا القسم.<br>
                يرجى التواصل مع المسؤول إذا كنت تعتقد أن هذا خطأ.
            </p>
            <div class="access-denied-actions">
                <a href="dashboard.html" class="btn-primary">
                    <i class="fas fa-home"></i> العودة للوحة التحكم
                </a>
                <button onclick="logout()" class="btn-secondary">
                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                </button>
            </div>
        </div>
    </div>
    
    <script src="assets/js/auth.js"></script>
</body>
</html>
